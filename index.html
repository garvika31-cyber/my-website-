<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalMetrics Pro</title>

<style>
body{
margin:0;
font-family:system-ui;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
padding:20px;
}

.app{
max-width:420px;width:100%;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
padding:20px;
border-radius:20px;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.1);
color:white;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:30px;
background:#00c6ff;
color:black;
font-weight:bold;
}

.result{
margin-top:15px;
display:none;
}

.card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:12px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="app">

<h2>🌿 VitalMetrics Pro</h2>
<p>Smart health insights in seconds</p>

<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<input id="age" type="number" placeholder="Age">
<input id="height" type="number" placeholder="Height (cm)">
<input id="weight" type="number" placeholder="Weight (kg)">

<select id="activity">
<option value="1.2">Low activity</option>
<option value="1.375">Light</option>
<option value="1.55">Moderate</option>
</select>

<select id="goal">
<option value="loss">Fat Loss</option>
<option value="maintain">Maintain</option>
<option value="gain">Muscle Gain</option>
</select>

<input id="sleep" type="number" placeholder="Sleep hours (e.g. 7)">

<button onclick="analyze()">Analyze My Health</button>

<div class="result" id="result">

<div class="card" id="scoreBox"></div>
<div class="card" id="bmiBox"></div>
<div class="card" id="calBox"></div>
<div class="card" id="insightBox"></div>

</div>

</div>

<script>
function analyze(){

let gender=document.getElementById("gender").value;
let age=+document.getElementById("age").value||25;
let h=+document.getElementById("height").value||170;
let w=+document.getElementById("weight").value||70;
let act=+document.getElementById("activity").value;
let goal=document.getElementById("goal").value;
let sleep=+document.getElementById("sleep").value||7;

// BMR
let bmr = gender==="male"
? (10*w)+(6.25*h)-(5*age)+5
: (10*w)+(6.25*h)-(5*age)-161;

// TDEE
let tdee = Math.round(bmr * act);

// Goal adjustment
if(goal==="loss") tdee -= 400;
if(goal==="gain") tdee += 300;

// BMI
let bmi=(w/((h/100)*(h/100))).toFixed(1);

// Category
let cat="Normal";
if(bmi<18.5) cat="Underweight";
else if(bmi<25) cat="Normal";
else if(bmi<30) cat="Overweight";
else cat="Obese";

// Score logic
let score = 100 - (bmi*1.5);
if(sleep<6) score -=5;
score=Math.max(50,Math.min(95,Math.round(score)));

// Insights
let insight="";

if(cat==="Overweight" || cat==="Obese"){
insight+="Your BMI suggests elevated metabolic risk. ";
}
if(sleep<6){
insight+="Low sleep may impact recovery and fat metabolism. ";
}
if(goal==="loss"){
insight+="A calorie deficit is applied to support fat loss. ";
}
if(gender==="female"){
insight+="Female metabolism may respond differently to calorie restriction. ";
}

if(insight===""){
insight="Your metrics fall within a generally healthy range.";
}

// Render
document.getElementById("scoreBox").innerHTML="<b>Health Score:</b> "+score+"/100";
document.getElementById("bmiBox").innerHTML="<b>BMI:</b> "+bmi+" ("+cat+")<br>Indicates body composition level.";
document.getElementById("calBox").innerHTML="<b>Daily Calories:</b> "+tdee+" kcal<br>Based on your lifestyle & goal.";
document.getElementById("insightBox").innerHTML="<b>Insights:</b> "+insight;

document.getElementById("result").style.display="block";
}
</script>

</body>
</html>
