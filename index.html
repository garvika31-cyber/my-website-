<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalMetrics Pro</title>

<style>
body{
margin:0;
font-family:system-ui;
color:white;
display:flex;
justify-content:center;
padding:20px;
background:linear-gradient(-45deg,#0f172a,#1e293b,#020617,#0ea5e9);
background-size:400% 400%;
animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.app{
max-width:420px;width:100%;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(25px);
padding:20px;
border-radius:22px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

h2{margin-bottom:5px;}
.subtitle{font-size:14px;opacity:0.7;margin-bottom:15px;}

input,select{
width:100%;
padding:12px;
margin:6px 0 12px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:30px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.main-btn{
background:linear-gradient(90deg,#22c55e,#4ade80);
color:#022c22;
box-shadow:0 0 15px #22c55e;
}

.cta-btn{
background:linear-gradient(90deg,#38bdf8,#22d3ee);
color:#022c22;
box-shadow:0 0 15px #38bdf8;
}

.result{display:none;margin-top:15px;}

.card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:14px;
margin-top:10px;
animation:fade 0.6s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.loader{
display:none;
text-align:center;
margin-top:20px;
}

.bar{
height:8px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:width 1s;
}

.score-bar{
height:10px;
background:#1e293b;
border-radius:10px;
margin-top:8px;
overflow:hidden;
}

.score-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:width 1s;
}

.cta{display:none;margin-top:20px;}

.trust{
font-size:13px;
opacity:0.75;
margin-top:10px;
}

.footer{
text-align:center;
font-size:12px;
opacity:0.5;
margin-top:15px;
}
</style>
</head>

<body>

<div class="app">

<h2>🌿 VitalMetrics Pro</h2>
<p class="subtitle">AI-powered health insights</p>

<input id="age" type="number" placeholder="🎂 Age">
<input id="height" type="number" placeholder="📏 Height (cm)">
<input id="weight" type="number" placeholder="⚖️ Weight (kg)">

<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<select id="activity">
<option value="1.2">Low activity</option>
<option value="1.375">Light</option>
<option value="1.55">Moderate</option>
</select>

<select id="goal">
<option value="loss">Fat Loss</option>
<option value="maintain">Maintain</option>
<option value="gain">Muscle Gain</option>
</select>

<input id="sleep" type="number" placeholder="🌙 Sleep hours">

<button class="main-btn" onclick="analyze()">🚀 Analyze My Health</button>

<div class="loader" id="loader">
<p>🤖 Analyzing your health...</p>
<div class="bar"><div class="fill" id="fill"></div></div>
</div>

<div class="result" id="result">

<div class="card">
🔥 <b>Health Score:</b> <span id="scoreText"></span>
<div class="score-bar"><div class="score-fill" id="scoreFill"></div></div>
</div>

<div class="card" id="bmiBox"></div>
<div class="card" id="calBox"></div>
<div class="card" id="insightBox"></div>

<div class="cta" id="ctaBox">
<button class="cta-btn" onclick="unlock()">🔓 Unlock My Personalized Plan</button>

<div class="trust">
✔ Custom diet + workout plan<br>
✔ Exact calories & macros<br>
✔ 7-day action system<br>
✔ Delivered within 24 hrs
</div>
</div>

</div>

<div class="footer">Smarter health starts here ⚡</div>

</div>

<script>
function analyze(){

document.getElementById("loader").style.display="block";
document.getElementById("result").style.display="none";

// loader animation
document.getElementById("fill").style.width="0%";
setTimeout(()=>{ document.getElementById("fill").style.width="100%"; },100);

setTimeout(()=>{

let age = +document.getElementById("age").value || 25;
let h = +document.getElementById("height").value || 170;
let w = +document.getElementById("weight").value || 70;
let act = +document.getElementById("activity").value;
let goal = document.getElementById("goal").value;
let sleep = +document.getElementById("sleep").value || 7;
let gender = document.getElementById("gender").value;

// BMR
let bmr = gender==="male"
? (10*w)+(6.25*h)-(5*age)+5
: (10*w)+(6.25*h)-(5*age)-161;

// TDEE
let tdee = Math.round(bmr * act);
if(goal==="loss") tdee -= 400;
if(goal==="gain") tdee += 300;

// BMI
let bmi=(w/((h/100)*(h/100))).toFixed(1);

// Category
let cat="Normal";
if(bmi<18.5) cat="Underweight";
else if(bmi<25) cat="Normal";
else if(bmi<30) cat="Overweight";
else cat="Obese";

// Score
let score = 100 - (bmi*1.5);
if(sleep<6) score -=5;
score=Math.max(50,Math.min(95,Math.round(score)));

// Insights
let insight="";
if(cat==="Overweight" || cat==="Obese"){
insight+="⚠️ Elevated metabolic risk. ";
}
if(sleep<6){
insight+="😴 Low sleep affects recovery. ";
}
if(goal==="loss"){
insight+="🔥 Calorie deficit applied. ";
}
if(gender==="female"){
insight+="⚖️ Hormonal response may vary. ";
}
if(insight===""){
insight="✅ Your metrics look healthy.";
}

// Render
document.getElementById("scoreText").innerText=score+"/100";
document.getElementById("scoreFill").style.width=score+"%";

document.getElementById("bmiBox").innerHTML="📊 BMI: "+bmi+" ("+cat+")";
document.getElementById("calBox").innerHTML="🍽 Calories: "+tdee+" kcal";
document.getElementById("insightBox").innerHTML="💡 "+insight;

// Show results
document.getElementById("loader").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("ctaBox").style.display="block";

},1500);
}

// WhatsApp CTA
function unlock(){
let msg="Hi, I want my personalized health report from VitalMetrics Pro.";
let phone="918851096893"; // PUT YOUR NUMBER
window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
