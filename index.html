<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalMetrics Pro</title>

<style>
body{
margin:0;
font-family:system-ui;
color:white;
display:flex;
justify-content:center;
padding:20px;
background:linear-gradient(-45deg,#0a0a0a,#1a0b2e,#000000,#2d0b45);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.app{
max-width:420px;width:100%;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(25px);
padding:22px;
border-radius:22px;
box-shadow:0 12px 40px rgba(0,0,0,0.7);
border:1px solid rgba(255,255,255,0.08);
}

.brand{
position:relative;
display:flex;
align-items:center;
gap:10px;
padding:12px 16px;
border-radius:14px;
margin-bottom:10px;
background:#c084fc;
overflow:hidden;
color:#1e1b4b;
font-size:20px;
font-weight:600;
}

.brand::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
animation:shine 3s infinite;
}

@keyframes shine{
0%{left:-100%;}
100%{left:100%;}
}

.logo{font-size:22px;color:#000;}
.name{color:#1e1b4b;}
.name b{font-weight:800;}

.subtitle{
font-size:16px;
opacity:0.85;
margin-bottom:18px;
color:#e2e8f0;
}

input,select{
width:100%;
padding:14px;
margin:8px 0 14px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.1);
color:white;
font-size:16px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:32px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.main-btn{
background:linear-gradient(90deg,#f97316,#fb923c);
color:black;
box-shadow:0 0 18px #f97316;
}

.cta-btn{
background:linear-gradient(90deg,#a855f7,#c084fc);
color:white;
box-shadow:0 0 18px #a855f7;
}

.result{display:none;margin-top:18px;}

.card{
background:rgba(255,255,255,0.08);
padding:16px;
border-radius:14px;
margin-top:12px;
font-size:16px;
line-height:1.6;
border:1px solid rgba(255,255,255,0.08);
}

.loader{display:none;text-align:center;margin-top:22px;}

.bar{height:10px;background:#111;border-radius:10px;overflow:hidden;}
.fill{height:100%;width:0%;background:linear-gradient(90deg,#a855f7,#f97316);transition:1s;}

.score-bar{height:12px;background:#111;border-radius:10px;overflow:hidden;margin-top:8px;}
.score-fill{height:100%;width:0%;background:linear-gradient(90deg,#a855f7,#f97316);transition:1s;}

.cta{display:none;margin-top:22px;}

.error{color:#f87171;font-size:14px;display:none;}
</style>
</head>

<body>

<div class="app">

<div class="brand">
<span class="logo">🌿</span>
<span class="name">VitalMetrics <b>Pro</b></span>
</div>

<p class="subtitle">Based on globally recognized health formulas</p>

<input id="age" type="number" placeholder="Age">
<input id="height" type="number" placeholder="Height (cm)">
<input id="weight" type="number" placeholder="Weight (kg)">

<input id="waist" type="number" placeholder="Waist (cm)">
<input id="neck" type="number" placeholder="Neck (cm)">
<input id="hip" type="number" placeholder="Hip (cm - for females)">

<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<select id="activity">
<option value="1.2">Low activity</option>
<option value="1.375">Light</option>
<option value="1.55">Moderate</option>
</select>

<select id="goal">
<option value="loss">Fat Loss</option>
<option value="maintain">Maintain</option>
<option value="gain">Muscle Gain</option>
</select>

<input id="sleep" type="number" placeholder="Sleep hours">

<button class="main-btn" onclick="analyze()">Analyze My Health</button>
<div class="error" id="errorMsg">Please fill all required fields</div>

<div class="loader" id="loader">
Analyzing...
<div class="bar"><div class="fill" id="fill"></div></div>
</div>

<div class="result" id="result">

<div class="card">
Health Score: <span id="scoreText"></span>
<div class="score-bar"><div id="scoreFill" class="score-fill"></div></div>
</div>

<div class="card" id="bmiBox"></div>
<div class="card" id="fatBox"></div>
<div class="card" id="calBox"></div>
<div class="card" id="macroBox"></div>
<div class="card" id="insightBox"></div>

<div class="cta" id="ctaBox">
<button class="cta-btn" onclick="unlock()">🔥 Get My Custom Plan (₹199)</button>
</div>

</div>

</div>

<script>
function analyze(){

let age = +age.value;
let h = +height.value;
let w = +weight.value;
let waistVal = +waist.value;
let neckVal = +neck.value;
let hipVal = +hip.value;
let sleepVal = +sleep.value;

if(!age||!h||!w||!waistVal||!neckVal||!sleepVal){
errorMsg.style.display="block"; return;
}else{errorMsg.style.display="none";}

loader.style.display="block";
result.style.display="none";

setTimeout(()=>{

let genderVal = gender.value;
let act = +activity.value;
let goalVal = goal.value;

// BMR
let bmr = genderVal==="male"
? (10*w)+(6.25*h)-(5*age)+5
: (10*w)+(6.25*h)-(5*age)-161;

// TDEE
let tdee = Math.round(bmr * act);
if(goalVal==="loss") tdee -= 400;
if(goalVal==="gain") tdee += 300;

// BMI
let bmi=(w/((h/100)*(h/100))).toFixed(1);

// Body fat
let bf;
if(genderVal==="male"){
bf = 86.010*Math.log10(waistVal-neckVal)-70.041*Math.log10(h)+36.76;
}else{
bf = 163.205*Math.log10(waistVal+hipVal-neckVal)-97.684*Math.log10(h)-78.387;
}
bf=bf.toFixed(1);

// Macros
let protein=Math.round(w*1.8);
let fats=Math.round((tdee*0.25)/9);
let carbs=Math.round((tdee-(protein*4+fats*9))/4);

// Score
let score=100;
if(bmi>25) score-=15;
if(bmi>30) score-=25;
if(sleepVal<6) score-=10;
if(act<1.3) score-=10;

score=Math.max(50,score);

// Insights
let insight="";
if(bmi>25) insight+="Elevated BMI linked to metabolic risk. ";
if(sleepVal<6) insight+="Low sleep affects hormones. ";
if(goalVal==="loss") insight+="Calorie deficit applied. ";

// Render
scoreText.innerText=score+"/100";
scoreFill.style.width=score+"%";

bmiBox.innerHTML="BMI: "+bmi;
fatBox.innerHTML="Body Fat: "+bf+"%";
calBox.innerHTML="Calories: "+tdee+" kcal";
macroBox.innerHTML="Protein: "+protein+"g | Carbs: "+carbs+"g | Fats: "+fats+"g";
insightBox.innerHTML=insight;

loader.style.display="none";
result.style.display="block";
ctaBox.style.display="block";

},1200);
}

function unlock(){
window.open("https://wa.me/918285583429?text=Hi, I want my plan");
}
</script>

</body>
</html>
