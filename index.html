<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalMetrics · Health Score</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}

body{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;justify-content:center;align-items:center;
min-height:100vh;padding:20px;
}

.app-container{
max-width:500px;width:100%;
background:white;border-radius:30px;
padding:22px;
box-shadow:0 30px 80px rgba(0,0,0,0.4);
}

h1{
font-size:26px;
background:linear-gradient(135deg,#0b3b5c,#1b6b8f);
-webkit-background-clip:text;
color:transparent;
}

.subhead{
font-size:14px;color:#555;margin-bottom:15px;
}

.viral-box{
background:#fff3cd;padding:10px;border-radius:12px;
text-align:center;font-size:13px;margin-bottom:10px;
}

input,select{
width:100%;padding:12px;margin-bottom:10px;
border-radius:12px;border:1px solid #ccc;
}

.btn{
background:#0b3b5c;color:white;
padding:15px;border:none;border-radius:50px;
width:100%;font-size:16px;font-weight:bold;
}

.report{
margin-top:15px;display:none;
}

.card{
background:#f0f6fe;padding:15px;border-radius:15px;
margin-bottom:10px;text-align:center;
}

.share-btn{
background:#25D366;color:white;padding:12px;
border:none;border-radius:40px;width:100%;
margin-top:10px;
}

.unlock{
background:#0b3b5c;color:white;padding:14px;
border-radius:50px;width:100%;margin-top:10px;
}
</style>
</head>

<body>

<div class="app-container">

<h1>🌿 VitalMetrics</h1>

<div class="subhead">
Discover your body score & hidden health risks in 30 seconds ⚡
</div>

<div class="viral-box">
🔥 92% people don’t know their real metabolism score
</div>

<input type="number" id="age" placeholder="Age">
<input type="number" id="height" placeholder="Height (cm)">
<input type="number" id="weight" placeholder="Weight (kg)">

<select id="activity">
<option value="1.2">Sedentary</option>
<option value="1.375">Light</option>
<option value="1.55">Moderate</option>
</select>

<button class="btn" onclick="generate()">Get My Health Score 🚀</button>

<div class="report" id="report">

<div class="card">
<h2 id="bmi">--</h2>
<p>BMI Score</p>
</div>

<div class="card">
<h2 id="calories">--</h2>
<p>Daily Calories</p>
</div>

<button class="share-btn" onclick="shareResult()">📲 Share with Friends</button>

<button class="unlock" onclick="unlock()">🔓 Unlock Full Plan (Only $1 Today)</button>

</div>

</div>

<script>
function generate(){
let age=parseFloat(document.getElementById("age").value)||25;
let h=parseFloat(document.getElementById("height").value)||170;
let w=parseFloat(document.getElementById("weight").value)||70;
let act=parseFloat(document.getElementById("activity").value);

let bmi=(w/((h/100)*(h/100))).toFixed(1);
let bmr=(10*w)+(6.25*h)-(5*age)+5;
let cal=Math.round(bmr*act);

document.getElementById("bmi").innerText=bmi;
document.getElementById("calories").innerText=cal;

document.getElementById("report").style.display="block";
}

function shareResult(){
let text="I checked my health score 🔥 Try it:";
let url=window.location.href;

if(navigator.share){
navigator.share({title:"Health Score",text:text,url:url});
}else{
alert(url);
}
}

function unlock(){
alert("👉 Connect this to payment or affiliate link to earn money 💰");
}
</script>

</body>
</html>
