<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalMetrics Pro</title>

<style>
body{
margin:0;
font-family:system-ui,-apple-system;
background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
color:white;
display:flex;
justify-content:center;
padding:20px;
}

.app{
max-width:420px;
width:100%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
padding:20px;
border-radius:22px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
margin-bottom:5px;
}

.subtitle{
font-size:14px;
opacity:0.7;
margin-bottom:15px;
}

label{
font-size:13px;
opacity:0.7;
}

input,select{
width:100%;
padding:12px;
margin:6px 0 12px 0;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
font-size:14px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:#022c22;
font-weight:bold;
font-size:15px;
cursor:pointer;
}

.result{
margin-top:15px;
display:none;
}

.card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:14px;
margin-top:10px;
line-height:1.5;
}

.cta{
margin-top:20px;
display:none;
}

.cta button{
background:linear-gradient(90deg,#38bdf8,#22d3ee);
color:#022c22;
}

.trust{
margin-top:15px;
font-size:13px;
opacity:0.75;
}

.footer{
margin-top:15px;
font-size:12px;
opacity:0.5;
text-align:center;
}
</style>
</head>

<body>

<div class="app">

<h2>🌿 VitalMetrics Pro</h2>
<p class="subtitle">AI-powered health insights in seconds</p>

<label>👤 Gender</label>
<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>🎂 Age</label>
<input id="age" type="number" placeholder="Enter your age">

<label>📏 Height (cm)</label>
<input id="height" type="number" placeholder="e.g. 170">

<label>⚖️ Weight (kg)</label>
<input id="weight" type="number" placeholder="e.g. 70">

<label>🏃 Activity Level</label>
<select id="activity">
<option value="1.2">Low activity</option>
<option value="1.375">Light</option>
<option value="1.55">Moderate</option>
</select>

<label>🎯 Goal</label>
<select id="goal">
<option value="loss">Fat Loss</option>
<option value="maintain">Maintain</option>
<option value="gain">Muscle Gain</option>
</select>

<label>🌙 Sleep (hours)</label>
<input id="sleep" type="number" placeholder="e.g. 7">

<button onclick="analyze()">🚀 Analyze My Health</button>

<div class="result" id="result">

<div class="card" id="scoreBox"></div>
<div class="card" id="bmiBox"></div>
<div class="card" id="calBox"></div>
<div class="card" id="insightBox"></div>

<div class="cta" id="ctaBox">
<button onclick="unlock()">🔓 Unlock My Personalized Plan</button>

<div class="trust">
✔ Custom fat loss / muscle strategy<br>
✔ Exact calories + macros<br>
✔ 7-day action plan<br>
✔ Delivered within 24 hours
</div>
</div>

</div>

<div class="footer">Built for smarter health decisions ⚡</div>

</div>

<script>
function analyze(){

let gender=document.getElementById("gender").value;
let age=+document.getElementById("age").value||25;
let h=+document.getElementById("height").value||170;
let w=+document.getElementById("weight").value||70;
let act=+document.getElementById("activity").value;
let goal=document.getElementById("goal").value;
let sleep=+document.getElementById("sleep").value||7;

// BMR
let bmr = gender==="male"
? (10*w)+(6.25*h)-(5*age)+5
: (10*w)+(6.25*h)-(5*age)-161;

// TDEE
let tdee = Math.round(bmr * act);

// Goal
if(goal==="loss") tdee -= 400;
if(goal==="gain") tdee += 300;

// BMI
let bmi=(w/((h/100)*(h/100))).toFixed(1);

// Category
let cat="Normal";
if(bmi<18.5) cat="Underweight";
else if(bmi<25) cat="Normal";
else if(bmi<30) cat="Overweight";
else cat="Obese";

// Score
let score = 100 - (bmi*1.5);
if(sleep<6) score -=5;
score=Math.max(50,Math.min(95,Math.round(score)));

// Insights
let insight="";
if(cat==="Overweight" || cat==="Obese"){
insight+="⚠️ Elevated metabolic risk. ";
}
if(sleep<6){
insight+="😴 Low sleep affects recovery. ";
}
if(goal==="loss"){
insight+="🔥 Calorie deficit applied. ";
}
if(gender==="female"){
insight+="⚖️ Hormonal response may vary. ";
}
if(insight===""){
insight="✅ Your metrics look healthy.";
}

// Render
document.getElementById("scoreBox").innerHTML="🔥 <b>Health Score:</b> "+score+"/100";
document.getElementById("bmiBox").innerHTML="📊 <b>BMI:</b> "+bmi+" ("+cat+")";
document.getElementById("calBox").innerHTML="🍽 <b>Daily Calories:</b> "+tdee+" kcal";
document.getElementById("insightBox").innerHTML="💡 <b>Insights:</b> "+insight;

document.getElementById("result").style.display="block";
document.getElementById("ctaBox").style.display="block";
}

// WhatsApp CTA
function unlock(){
let msg = "Hi, I want my personalized health report from VitalMetrics Pro.";
let phone = "918851096893"; // PUT YOUR NUMBER

window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(msg), "_blank");
}
</script>

</body>
</html>
