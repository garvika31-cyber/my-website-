<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalMetrics Pro</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
padding:20px;
}

.app{
max-width:420px;width:100%;
background:#1e293b;
padding:20px;
border-radius:16px;
}

.brand{
background:#c084fc;
color:#1e1b4b;
padding:10px;
border-radius:10px;
font-weight:bold;
text-align:center;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#334155;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:25px;
margin-top:10px;
font-weight:bold;
}

.main-btn{background:#f97316;color:black;}
.cta-btn{background:#a855f7;color:white;}

.result{display:none;margin-top:15px;}
.card{
background:#334155;
padding:10px;
border-radius:8px;
margin-top:8px;
}

.error{color:#f87171;display:none;}
</style>
</head>

<body>

<div class="app">

<div class="brand">🌿 VitalMetrics Pro</div>

<input id="age" type="number" placeholder="Age">
<input id="height" type="number" placeholder="Height (cm)">
<input id="weight" type="number" placeholder="Weight (kg)">
<input id="waist" type="number" placeholder="Waist (cm)">
<input id="neck" type="number" placeholder="Neck (cm)">
<input id="hip" type="number" placeholder="Hip (for female)">
<input id="sleep" type="number" placeholder="Sleep hours">

<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<select id="activity">
<option value="1.2">Low</option>
<option value="1.375">Light</option>
<option value="1.55">Moderate</option>
</select>

<select id="goal">
<option value="loss">Fat Loss</option>
<option value="maintain">Maintain</option>
<option value="gain">Gain</option>
</select>

<button class="main-btn" onclick="analyze()">Analyze</button>

<div class="error" id="errorMsg">Fill all required fields</div>

<div class="result" id="result">
<div class="card" id="score"></div>
<div class="card" id="bmi"></div>
<div class="card" id="fat"></div>
<div class="card" id="cal"></div>
<div class="card" id="macro"></div>
<div class="card" id="insight"></div>

<button class="cta-btn" onclick="unlock()">Get Plan ₹199</button>
</div>

</div>

<script>
function analyze(){

// GET VALUES
let age = document.getElementById("age").value;
let height = document.getElementById("height").value;
let weight = document.getElementById("weight").value;
let waist = document.getElementById("waist").value;
let neck = document.getElementById("neck").value;
let sleep = document.getElementById("sleep").value;

if(!age || !height || !weight || !waist || !neck || !sleep){
document.getElementById("errorMsg").style.display="block";
return;
}

document.getElementById("errorMsg").style.display="none";

// CONVERT
age = Number(age);
height = Number(height);
weight = Number(weight);
waist = Number(waist);
neck = Number(neck);
sleep = Number(sleep);

let hip = Number(document.getElementById("hip").value) || 0;
let gender = document.getElementById("gender").value;
let activity = Number(document.getElementById("activity").value);
let goal = document.getElementById("goal").value;

// BMR
let bmr;
if(gender==="male"){
bmr = (10*weight)+(6.25*height)-(5*age)+5;
}else{
bmr = (10*weight)+(6.25*height)-(5*age)-161;
}

// TDEE
let calories = Math.round(bmr * activity);
if(goal==="loss") calories -= 400;
if(goal==="gain") calories += 300;

// BMI
let bmi = (weight / ((height/100)*(height/100))).toFixed(1);

// BODY FAT
let bodyFat;
if(gender==="male"){
bodyFat = 86.010*Math.log10(waist-neck)-70.041*Math.log10(height)+36.76;
}else{
bodyFat = 163.205*Math.log10(waist+hip-neck)-97.684*Math.log10(height)-78.387;
}
bodyFat = bodyFat.toFixed(1);

// MACROS
let protein = Math.round(weight * 1.8);
let fats = Math.round((calories * 0.25)/9);
let carbs = Math.round((calories - (protein*4 + fats*9))/4);

// SCORE
let score = 100;
if(bmi>25) score -= 15;
if(bmi>30) score -= 25;
if(sleep<6) score -= 10;
if(activity<1.3) score -= 10;
score = Math.max(50, score);

// OUTPUT
document.getElementById("score").innerText = "Health Score: " + score + "/100";
document.getElementById("bmi").innerText = "BMI: " + bmi;
document.getElementById("fat").innerText = "Body Fat: " + bodyFat + "%";
document.getElementById("cal").innerText = "Calories: " + calories + " kcal";
document.getElementById("macro").innerText = "Protein: "+protein+"g | Carbs: "+carbs+"g | Fats: "+fats+"g";
document.getElementById("insight").innerText = "Maintain calorie balance & improve sleep.";

document.getElementById("result").style.display="block";
}

// WHATSAPP
function unlock(){
window.open("https://wa.me/91XXXXXXXXXX?text=Hi, I want my personalized plan");
}
</script>

</body>
</html>
