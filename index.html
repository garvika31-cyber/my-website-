<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalMetrics Pro</title>

<style>
body{
margin:0;
font-family:system-ui;
color:white;
display:flex;
justify-content:center;
padding:20px;
background:linear-gradient(-45deg,#0a0a0a,#1a0b2e,#000000,#2d0b45);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.app{
max-width:420px;width:100%;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(25px);
padding:22px;
border-radius:22px;
box-shadow:0 12px 40px rgba(0,0,0,0.7);
border:1px solid rgba(255,255,255,0.08);
}

h2{
margin-bottom:6px;
font-size:24px;
}

.subtitle{
font-size:16px;
opacity:0.8;
margin-bottom:18px;
color:#e2e8f0;
}

input,select{
width:100%;
padding:14px;
margin:8px 0 14px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.1);
color:white;
font-size:16px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:32px;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

/* ORANGE = ACTION */
.main-btn{
background:linear-gradient(90deg,#f97316,#fb923c);
color:black;
box-shadow:0 0 18px #f97316;
}

/* PURPLE = PREMIUM CTA */
.cta-btn{
background:linear-gradient(90deg,#a855f7,#c084fc);
color:white;
box-shadow:0 0 18px #a855f7;
}

.result{display:none;margin-top:18px;}

.card{
background:rgba(255,255,255,0.08);
padding:16px;
border-radius:14px;
margin-top:12px;
font-size:16px;
line-height:1.6;
border:1px solid rgba(255,255,255,0.08);
animation:fade 0.6s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.loader{
display:none;
text-align:center;
margin-top:22px;
font-size:16px;
}

.bar{
height:10px;
background:#111;
border-radius:10px;
overflow:hidden;
margin-top:12px;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#a855f7,#f97316);
transition:width 1s;
}

.score-bar{
height:12px;
background:#111;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

.score-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#a855f7,#f97316);
transition:width 1s;
}

.cta{display:none;margin-top:22px;}

.trust{
font-size:14px;
opacity:0.85;
margin-top:12px;
line-height:1.5;
color:#e5e7eb;
}

.footer{
text-align:center;
font-size:13px;
opacity:0.6;
margin-top:18px;
color:#cbd5f5;
}
</style>
</head>

<body>

<div class="app">

<h2>🌿 VitalMetrics Pro</h2>
<p class="subtitle">AI-powered health insights</p>

<input id="age" type="number" placeholder="🎂 Age">
<input id="height" type="number" placeholder="📏 Height (cm)">
<input id="weight" type="number" placeholder="⚖️ Weight (kg)">

<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<select id="activity">
<option value="1.2">Low activity</option>
<option value="1.375">Light</option>
<option value="1.55">Moderate</option>
</select>

<select id="goal">
<option value="loss">Fat Loss</option>
<option value="maintain">Maintain</option>
<option value="gain">Muscle Gain</option>
</select>

<input id="sleep" type="number" placeholder="🌙 Sleep hours">

<button class="main-btn" onclick="analyze()">🚀 Analyze My Health</button>

<div class="loader" id="loader">
<p>🤖 Analyzing your health...</p>
<div class="bar"><div class="fill" id="fill"></div></div>
</div>

<div class="result" id="result">

<div class="card">
🔥 <b>Health Score:</b> <span id="scoreText"></span>
<div class="score-bar"><div class="score-fill" id="scoreFill"></div></div>
</div>

<div class="card" id="bmiBox"></div>
<div class="card" id="calBox"></div>
<div class="card" id="insightBox"></div>

<div class="cta" id="ctaBox">
<button class="cta-btn" onclick="unlock()">🔓 Unlock My Personalized Plan</button>

<div class="trust">
✔ Custom diet + workout plan<br>
✔ Exact calories & macros<br>
✔ 7-day action system<br>
✔ Delivered within 24 hrs
</div>
</div>

</div>

<div class="footer">Smarter health starts here ⚡</div>

</div>

<script>
function analyze(){

document.getElementById("loader").style.display="block";
document.getElementById("result").style.display="none";

document.getElementById("fill").style.width="0%";
setTimeout(()=>{ document.getElementById("fill").style.width="100%"; },100);

setTimeout(()=>{

let age = +document.getElementById("age").value || 25;
let h = +document.getElementById("height").value || 170;
let w = +document.getElementById("weight").value || 70;
let act = +document.getElementById("activity").value;
let goal = document.getElementById("goal").value;
let sleep = +document.getElementById("sleep").value || 7;
let gender = document.getElementById("gender").value;

let bmr = gender==="male"
? (10*w)+(6.25*h)-(5*age)+5
: (10*w)+(6.25*h)-(5*age)-161;

let tdee = Math.round(bmr * act);
if(goal==="loss") tdee -= 400;
if(goal==="gain") tdee += 300;

let bmi=(w/((h/100)*(h/100))).toFixed(1);

let cat="Normal";
if(bmi<18.5) cat="Underweight";
else if(bmi<25) cat="Normal";
else if(bmi<30) cat="Overweight";
else cat="Obese";

let score = 100 - (bmi*1.5);
if(sleep<6) score -=5;
score=Math.max(50,Math.min(95,Math.round(score)));

let insight="Your personalized health insights are ready.";

document.getElementById("scoreText").innerText=score+"/100";
document.getElementById("scoreFill").style.width=score+"%";

document.getElementById("bmiBox").innerHTML="📊 BMI: "+bmi+" ("+cat+")";
document.getElementById("calBox").innerHTML="🍽 Calories: "+tdee+" kcal";
document.getElementById("insightBox").innerHTML="💡 "+insight;

document.getElementById("loader").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("ctaBox").style.display="block";

},1500);
}

function unlock(){
let msg="Hi, I want my personalized health report from VitalMetrics Pro.";
let phone="918285583429";
window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
