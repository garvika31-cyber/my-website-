<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VitalMetrics Pro</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
display:flex;
justify-content:center;
padding:20px;
}

.app{
max-width:420px;width:100%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:20px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* HEADER */
.brand{
background:linear-gradient(90deg,#a855f7,#c084fc);
padding:14px;
border-radius:14px;
font-size:20px;
font-weight:600;
text-align:center;
color:#1e1b4b;
}

/* SUBTEXT */
.subtitle{
text-align:center;
font-size:14px;
opacity:0.85;
margin:10px 0 18px;
}

/* INPUTS */
input,select{
width:100%;
padding:13px;
margin:8px 0;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
font-size:14px;
}

/* BUTTONS */
button{
width:100%;
padding:15px;
border:none;
border-radius:30px;
margin-top:12px;
font-weight:600;
font-size:15px;
cursor:pointer;
}

.main-btn{
background:linear-gradient(90deg,#f97316,#fb923c);
color:black;
box-shadow:0 0 15px rgba(249,115,22,0.7);
}

.cta-btn{
background:linear-gradient(90deg,#a855f7,#c084fc);
color:white;
box-shadow:0 0 15px rgba(168,85,247,0.7);
}

/* RESULT */
.result{display:none;margin-top:15px;}

.card{
background:rgba(255,255,255,0.08);
padding:14px;
border-radius:12px;
margin-top:10px;
font-size:14px;
line-height:1.6;
}

/* ERROR */
.error{
color:#f87171;
font-size:13px;
display:none;
margin-top:8px;
text-align:center;
}

/* FOOTER */
.footer{
text-align:center;
font-size:12px;
opacity:0.6;
margin-top:15px;
}
</style>
</head>

<body>

<div class="app">

<div class="brand">🌿 VitalMetrics Pro</div>
<div class="subtitle">Smart health insights based on real formulas</div>

<input id="age" type="number" placeholder="🎂 Age">
<input id="height" type="number" placeholder="📏 Height (cm)">
<input id="weight" type="number" placeholder="⚖️ Weight (kg)">
<input id="waist" type="number" placeholder="📐 Waist (cm)">
<input id="neck" type="number" placeholder="📏 Neck (cm)">
<input id="hip" type="number" placeholder="📐 Hip (for females)">
<input id="sleep" type="number" placeholder="🌙 Sleep hours">

<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<select id="activity">
<option value="1.2">Low activity</option>
<option value="1.375">Light</option>
<option value="1.55">Moderate</option>
</select>

<select id="goal">
<option value="loss">Fat Loss</option>
<option value="maintain">Maintain</option>
<option value="gain">Muscle Gain</option>
</select>

<button class="main-btn" onclick="analyze()">🚀 Analyze My Health</button>

<div class="error" id="errorMsg">⚠️ Please fill all required fields</div>

<div class="result" id="result">

<div class="card" id="score"></div>
<div class="card" id="bmi"></div>
<div class="card" id="fat"></div>
<div class="card" id="cal"></div>
<div class="card" id="macro"></div>
<div class="card" id="insight"></div>

<button class="cta-btn" onclick="unlock()">🔥 Get My Custom Plan (₹199)</button>

</div>

<div class="footer">Built for smarter health ⚡</div>

</div>

<script>
function analyze(){

let age = document.getElementById("age").value;
let height = document.getElementById("height").value;
let weight = document.getElementById("weight").value;
let waist = document.getElementById("waist").value;
let neck = document.getElementById("neck").value;
let sleep = document.getElementById("sleep").value;

if(!age || !height || !weight || !waist || !neck || !sleep){
document.getElementById("errorMsg").style.display="block";
return;
}

document.getElementById("errorMsg").style.display="none";

age = Number(age);
height = Number(height);
weight = Number(weight);
waist = Number(waist);
neck = Number(neck);
sleep = Number(sleep);

let hip = Number(document.getElementById("hip").value) || 0;
let gender = document.getElementById("gender").value;
let activity = Number(document.getElementById("activity").value);
let goal = document.getElementById("goal").value;

// BMR
let bmr = gender==="male"
? (10*weight)+(6.25*height)-(5*age)+5
: (10*weight)+(6.25*height)-(5*age)-161;

// Calories
let calories = Math.round(bmr * activity);
if(goal==="loss") calories -= 400;
if(goal==="gain") calories += 300;

// BMI
let bmi = (weight / ((height/100)*(height/100))).toFixed(1);

// Body Fat
let bodyFat;
if(gender==="male"){
bodyFat = 86.010*Math.log10(waist-neck)-70.041*Math.log10(height)+36.76;
}else{
bodyFat = 163.205*Math.log10(waist+hip-neck)-97.684*Math.log10(height)-78.387;
}
bodyFat = bodyFat.toFixed(1);

// Macros
let protein = Math.round(weight * 1.8);
let fats = Math.round((calories * 0.25)/9);
let carbs = Math.round((calories - (protein*4 + fats*9))/4);

// Score
let score = 100;
if(bmi>25) score -= 15;
if(bmi>30) score -= 25;
if(sleep<6) score -= 10;
if(activity<1.3) score -= 10;
score = Math.max(50, score);

// OUTPUT
document.getElementById("score").innerHTML = "🔥 <b>Health Score:</b> "+score+"/100";
document.getElementById("bmi").innerHTML = "📊 <b>BMI:</b> "+bmi;
document.getElementById("fat").innerHTML = "💪 <b>Body Fat:</b> "+bodyFat+"%";
document.getElementById("cal").innerHTML = "🍽 <b>Calories:</b> "+calories+" kcal";
document.getElementById("macro").innerHTML = "🥗 <b>Macros:</b><br>Protein: "+protein+"g | Carbs: "+carbs+"g | Fats: "+fats+"g";
document.getElementById("insight").innerHTML = "⚡ Improve sleep, maintain calories & stay consistent.";

document.getElementById("result").style.display="block";
}

// WhatsApp
function unlock(){
window.open("https://wa.me/91XXXXXXXXXX?text=Hi, I checked my health score and want my personalized plan");
}
</script>

</body>
</html>
